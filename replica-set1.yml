---
apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: tomcat-rs
  labels: 
    type: appserver
    owner: mohansai
spec:
  replicas: 2
  selector:
    matchLabels:        
      type: appserver
  template:
    metadata:
      labels:           
        type: appserver
    spec:
      containers:
        - name: mytomcat
          image: tomee
          ports:
            - containerPort: 8080
              hostPort: 9090
...
