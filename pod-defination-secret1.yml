---
apiVersion: v1
kind: Pod
metadata: 
 name: postgres-pod
 labels: 
   app: datbase
   owner: mohan
spec: 
  containers: 
    - name: mydb
      image: postgres
      env: 
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: a
        - name : POSTGRES_USER
          valueFrom: 
            secretKeyRef: 
              name: postgres-secret
              key: b 
        - name: POSTGRES_DB
          valueFrom: 
            secretKeyRef: 
              name: postgres-secret
              key: c    

...
