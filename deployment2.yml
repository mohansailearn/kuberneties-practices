---
apiVersion: apps/v1
kind: Deployment
metadata: 
  name: mysql-deployment
  labels: 
    app: db
spec: 
  replicas: 3
  selector:
    matchLabels: 
      app: db
  template:
    metadata: 
      name: mysql-pod
      labels: 
        app: db
    spec: 
      containers: 
        - name: mydb
          image: mysql
          env: 
           - name: MYSQL_ROOT_PASSWORD 
             value: mohansai
          resources: 
            requests: 
              cpu: 100m
              memory: 64M
            limits:  
              cpu: 200m
              memory: 128M

...
